<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GW25 冠军争夺战</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-bg"></div>
  <main class="wrap">
    <header class="hero">
      <p class="eyebrow">NBA Fantasy H2H</p>
      <h1>GW25 冠军争夺实时曲线</h1>
      <p class="sub">
        四人组：大吉鲁、笨笨、kimi、ai。每条线表示「当前 H2H 联赛积分（基线 + 本轮对阵结果）」
      </p>
    </header>

    <section class="controls">
      <button id="refresh-btn" class="btn btn-light" type="button">刷新数据</button>
      <button id="play-btn" class="btn btn-main" type="button">播放</button>
      <button id="reset-btn" class="btn btn-light" type="button">重置</button>
      <label class="speed-label">
        速度
        <select id="speed-select">
          <option value="0.6">0.6x</option>
          <option value="1" selected>1x</option>
          <option value="1.6">1.6x</option>
          <option value="2.2">2.2x</option>
        </select>
      </label>
      <button id="export-btn" class="btn btn-danger" type="button">导出 MP4</button>
    </section>

    <section class="chart-panel">
      <div class="chart-head">
        <div id="day-title" class="day-title">-</div>
        <div id="status-pill" class="status-pill">-</div>
      </div>
      <canvas id="race-canvas" width="1400" height="760"></canvas>
      <input id="timeline-slider" type="range" min="0" max="0" step="0.001" value="0">
      <div id="legend" class="legend"></div>
    </section>

    <section class="detail-grid">
      <article class="card">
        <h2>当天对阵</h2>
        <div id="matchups" class="rows"></div>
      </article>
      <article class="card">
        <h2>争冠排名</h2>
        <div id="ranking" class="rows"></div>
      </article>
      <article class="card card-wide">
        <h2>Gameday 赛程信息</h2>
        <div id="gameday-info" class="rows"></div>
      </article>
    </section>

    <footer class="foot">
      <div id="meta-line">加载中...</div>
      <div id="export-line" class="export-line"></div>
    </footer>
  </main>

  <script src="./app.js" type="module"></script>
</body>
</html>
