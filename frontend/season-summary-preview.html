<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Fantasy 赛季总结</title>
    <link rel="stylesheet" href="./css/season-summary-local.css">
</head>
<body>
    <main class="shell">
        <section class="hero">
            <div class="hero-copy">
                <div class="eyebrow">Season Summary Local Build</div>
                <h1>NBA Fantasy<br>赛季总结子页面</h1>
                <p>这是一版本地可直接打开的初版文件。当前完全使用静态缓存数据，不依赖后端；后续只要把本地缓存替换成真实抓取结果，就能平滑切到正式版。</p>
            </div>
            <aside class="hero-side">
                <strong>当前这版的定位</strong>
                <ul>
                    <li>输入 UID 后马上产出 6 页初步效果</li>
                    <li>不调用 Worker，不担心线上调试影响正式站</li>
                    <li>后面可作为站内子页面继续演进</li>
                </ul>
            </aside>
        </section>

        <section class="toolbar">
            <div class="control-group">
                <label for="uid-input">请输入 UID</label>
                <input class="uid-input" id="uid-input" value="6412">
                <button class="primary-btn" id="generate-btn" type="button">生成赛季总结</button>
            </div>
            <div class="sample-pool">
                <button class="sample-chip" type="button" data-uid="6412">阿甘 6412</button>
                <button class="sample-chip" type="button" data-uid="6562">柯南 6562</button>
                <button class="sample-chip" type="button" data-uid="14">酸男 14</button>
            </div>
            <div class="pager">
                <button type="button" id="prev-page">上一页</button>
                <span id="page-indicator">1 / 6</span>
                <button type="button" id="next-page">下一页</button>
            </div>
        </section>

        <section class="status-bar">
            <div id="status-text">当前使用本地缓存样本数据。</div>
            <div id="status-source">Source: local static cache</div>
        </section>

        <div class="book">
            <div class="page-stack" id="page-stack"></div>
        </div>
    </main>

    <script src="./js/season-summary-local.js"></script>
</body>
</html>
